name: Release Orchestration

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  actions: write
  contents: write

concurrency:
  group: release-orchestration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  orchestrate-build-matrix:
    name: Orchestrate and gate build matrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure required workflows exist
        shell: bash
        run: |
          required=(
            ".github/workflows/release-channel-gates.yml"
            ".github/workflows/release-signoff-gate.yml"
            ".github/workflows/validate-msix-lane.yml"
            ".github/workflows/linux-repo-index.yml"
            ".github/workflows/build-cli-packages.yml"
            ".github/workflows/build-desktop-apps.yml"
            ".github/workflows/build-mobile-android.yml"
            ".github/workflows/build-mobile-ios.yml"
            ".github/workflows/build-harmonyos.yml"
            ".github/workflows/build-bootable-iso.yml"
            ".github/workflows/build-release.yml"
            ".github/workflows/publish-pypi.yml"
          )

          for wf in "${required[@]}"; do
            test -f "$wf" || { echo "Missing required workflow: $wf"; exit 1; }
            echo "OK: $wf"
          done

      - name: Trigger required workflows (manual orchestration)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref.replace("refs/heads/", "").replace("refs/tags/", "");
            const workflows = [
              "release-channel-gates.yml",
              "release-signoff-gate.yml",
              "validate-msix-lane.yml",
              "linux-repo-index.yml",
              "build-cli-packages.yml",
              "build-desktop-apps.yml",
              "build-mobile-android.yml",
              "build-mobile-ios.yml",
              "build-harmonyos.yml",
              "build-bootable-iso.yml",
              "build-release.yml",
              "publish-pypi.yml"
            ];

            for (const workflow_id of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref
              });
              core.info(`Dispatched ${workflow_id} on ref ${ref}`);
            }

      - name: Wait for required workflows to complete
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.sha;
            const startedAt = Date.now();
            const timeoutMs = 3 * 60 * 60 * 1000; // 3 hours
            const pollMs = 20 * 1000;

            const workflows = [
              "release-channel-gates.yml",
              "release-signoff-gate.yml",
              "validate-msix-lane.yml",
              "linux-repo-index.yml",
              "build-cli-packages.yml",
              "build-desktop-apps.yml",
              "build-mobile-android.yml",
              "build-mobile-ios.yml",
              "build-harmonyos.yml",
              "build-bootable-iso.yml",
              "build-release.yml",
              "publish-pypi.yml"
            ];

            const pending = new Set(workflows);
            const failures = [];
            const success = [];

            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            while (pending.size > 0) {
              if (Date.now() - startedAt > timeoutMs) {
                core.setFailed(`Timed out while waiting for workflows: ${Array.from(pending).join(", ")}`);
                return;
              }

              for (const wf of Array.from(pending)) {
                const runs = await github.paginate(
                  github.rest.actions.listWorkflowRuns,
                  {
                    owner,
                    repo,
                    workflow_id: wf,
                    per_page: 100
                  }
                );

                const run = runs.find(r => r.head_sha === targetSha);

                if (!run) {
                  core.info(`No run yet for ${wf} on sha ${targetSha}`);
                  continue;
                }

                core.info(`Observed ${wf}: status=${run.status}, conclusion=${run.conclusion ?? "n/a"}`);

                if (run.status !== "completed") {
                  continue;
                }

                pending.delete(wf);

                if (run.conclusion === "success") {
                  success.push(wf);
                } else {
                  failures.push(`${wf} (${run.conclusion})`);
                }
              }

              if (pending.size > 0) {
                await sleep(pollMs);
              }
            }

            core.info(`Succeeded workflows: ${success.join(", ")}`);

            if (failures.length > 0) {
              core.setFailed(`Release matrix failed: ${failures.join(", ")}`);
            }

  finalize-release:
    name: Finalize release metadata sync
    runs-on: ubuntu-latest
    needs:
      - orchestrate-build-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync docs-site release metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m tools.sync_release_metadata --owner mufthakherul --repo device-inspector --output docs-site/data/releases.json

      - name: Generate docs-site distribution manifest
        run: python -m tools.generate_distribution_manifest --repo-root . --releases-json docs-site/data/releases.json --output docs-site/data/distribution-manifest.json

      - name: Commit metadata update (if changed)
        shell: bash
        run: |
          if git diff --quiet -- docs-site/data/releases.json docs-site/data/distribution-manifest.json; then
            echo "No metadata changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs-site/data/releases.json docs-site/data/distribution-manifest.json
          git commit -m "chore(release): refresh docs-site distribution metadata"
          git push
