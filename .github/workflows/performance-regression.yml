name: Performance Regression

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quick-mode-benchmark:
    name: Quick mode benchmark guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark and guardrail check
        shell: python
        run: |
          import json
          import shutil
          import subprocess
          import time
          from pathlib import Path

          runs = 3
          threshold_seconds = 120.0
          durations = []

          for i in range(runs):
            out_dir = Path(f"perf-smoke-{i+1}")
            if out_dir.exists():
              shutil.rmtree(out_dir)

            start = time.perf_counter()
            proc = subprocess.run(
              [
                "python",
                "-m",
                "agent.cli",
                "run",
                "--mode",
                "quick",
                "--output",
                str(out_dir),
                "--use-sample",
                "--no-auto-open",
                "--format",
                "txt",
              ],
              check=False,
            )
            if proc.returncode not in (0, 10):
              raise SystemExit(proc.returncode)
            durations.append(time.perf_counter() - start)

          mean_seconds = sum(durations) / len(durations)
          result = {
            "runs": runs,
            "durations_seconds": durations,
            "mean_seconds": mean_seconds,
            "threshold_seconds": threshold_seconds,
          }

          Path("performance-report.json").write_text(
            json.dumps(result, indent=2) + "\n", encoding="utf-8"
          )

          print(json.dumps(result, indent=2))

          if mean_seconds > threshold_seconds:
            raise SystemExit(
              f"Performance regression: mean={mean_seconds:.2f}s > threshold={threshold_seconds:.2f}s"
            )

      - name: Upload performance artifact
        uses: actions/upload-artifact@v7
        with:
          name: performance-regression-report
          path: performance-report.json
          retention-days: 30
