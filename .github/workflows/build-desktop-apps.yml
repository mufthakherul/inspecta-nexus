name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  desktop-build:
    name: Desktop Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build desktop installers
        run: npm run dist

      - name: Upload desktop installers
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-desktop-${{ matrix.os }}
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.msi
            apps/desktop/dist/*.appx
            apps/desktop/dist/*.msix
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.pkg
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest*.yml
          retention-days: 30
