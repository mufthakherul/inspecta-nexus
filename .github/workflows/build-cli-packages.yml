name: Build CLI Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-cli:
    name: CLI package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: Install Linux packagers
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev ruby ruby-dev rpm curl
          sudo gem install --no-document fpm
          curl -L -o /tmp/appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build release package
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            python scripts/build_release.py --platform windows
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            python scripts/build_release.py --platform macos
          else
            python scripts/build_release.py --platform linux --native-linux
          fi
        shell: bash

      - name: Build wheel and sdist
        run: |
          python -m pip install build
          python -m build

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-cli-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.whl
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/SHA256SUMS
          retention-days: 30
