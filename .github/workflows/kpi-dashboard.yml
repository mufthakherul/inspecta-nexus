name: KPI Dashboard Snapshot

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    generate-kpi-snapshot:
        name: Generate KPI snapshot data
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run tests with junit output
              run: |
                  mkdir -p test-output
                  pytest --junitxml test-output/junit.xml

            - name: Generate KPI snapshot
              run: |
                  python tools/generate_kpi_snapshot.py --coverage-xml coverage.xml --junit-xml test-output/junit.xml --output docs-site/data/kpi.json

            - name: Validate KPI snapshot quality gate
              run: |
                  python -m tools.validate_kpi_snapshot --kpi-json docs-site/data/kpi.json --min-coverage 35 --min-tests 1

            - name: Upload KPI snapshot artifact
              uses: actions/upload-artifact@v7
              with:
                  name: docs-site-kpi-snapshot
                  path: docs-site/data/kpi.json
                  retention-days: 30
