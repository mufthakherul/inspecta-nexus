name: Build Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
        default: "0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: Build Windows executable
        run: |
          python scripts/build_release.py --platform windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-windows
          path: |
            dist/inspecta-*-windows.zip
            dist/SHA256SUMS
          retention-days: 30

  build-macos:
    name: Build macOS Package
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: Build macOS executable
        run: |
          python scripts/build_release.py --platform macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-macos
          path: |
            dist/inspecta-*-macos.zip
            dist/SHA256SUMS
          retention-days: 30

  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .
          sudo apt-get update
          sudo apt-get install -y dpkg-dev ruby ruby-dev rpm curl
          sudo gem install --no-document fpm
          curl -L -o /tmp/appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build Linux executable
        run: |
          python scripts/build_release.py --platform linux --native-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-linux
          path: |
            dist/inspecta-*-linux.zip
            dist/inspecta-*-linux-amd64.deb
            dist/inspecta-*-linux-amd64.rpm
            dist/inspecta-*-linux-x86_64.AppImage
            dist/SHA256SUMS
          retention-days: 30

  build-python-dist:
    name: Build Python Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Generate Python dist checksums
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          dist = Path('dist')
          lines = []
          for path in sorted(dist.glob('*')):
            if path.name == 'SHA256SUMS':
              continue
            if path.is_file():
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")

          (dist / 'SHA256SUMS').write_text("\n".join(lines) + "\n", encoding='utf-8')
          PY

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux, build-python-dist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      HAS_GPG_SIGNING: ${{ secrets.RELEASE_GPG_PRIVATE_KEY != '' && secrets.RELEASE_GPG_PASSPHRASE != '' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-packages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import release signing key (optional)
        if: ${{ env.HAS_GPG_SIGNING == 'true' }}
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$RELEASE_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import

      - name: Generate detached release signatures (optional)
        if: ${{ env.HAS_GPG_SIGNING == 'true' }}
        shell: bash
        env:
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          python -m tools.release_signing \
            --input-dir release-packages \
            --output-dir release-signatures \
            --report release-signatures/signing-report.json \
            --fail-on-error \
            --gpg-passphrase "$RELEASE_GPG_PASSPHRASE"

      - name: Upload release signature bundle (optional)
        if: ${{ env.HAS_GPG_SIGNING == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: inspecta-release-signatures
          path: |
            release-signatures/**/*.asc
            release-signatures/signing-report.json
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-packages/**/*.zip
            release-packages/**/*.deb
            release-packages/**/*.rpm
            release-packages/**/*.AppImage
            release-packages/**/*.whl
            release-packages/**/*.tar.gz
            release-packages/**/SHA256SUMS
            release-signatures/**/*.asc
            release-signatures/signing-report.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
